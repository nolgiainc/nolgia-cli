        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: Delete one of the current user's projects. Member assets are never deleted.
      description: >
        The default "Library" project can be deleted like any other project;
        a fresh one is recreated on demand the next time an asset needs a
        default home.
      parameters:
        - name: id
          in: path
          required: true
