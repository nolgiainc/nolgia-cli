              schema:
                $ref: '#/components/schemas/Composition'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags: [Compositions]
      operationId: updateComposition
      summary: Update a composition's name, description, project link, or meta.
      description: Partial update; only provided fields change. Renaming to another composition's name returns 409; linking to an unknown or foreign project returns 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
