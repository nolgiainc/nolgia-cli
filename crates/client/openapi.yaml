  /compositions/{id}/file:
    put:
      tags: [Compositions]
      operationId: putCompositionFile
      summary: Upload or overwrite one file in a composition.
      description: |
        Upserts the file at the relative bundle path given by the `path` query
        parameter (uploading the same path again overwrites it). The path is a
        query parameter rather than a path parameter because bundle paths
        contain slashes (e.g. `compositions/scene1.html`) and the generated
        chi router does not support greedy path parameters.

        Constraints: the path must be relative (no leading `/`), must not
        contain `.` or `..` segments, and is at most 200 characters; the
        decoded content is at most 25 MiB; a composition holds at most 200
        files; the content type must be one of text/html, text/css,
        application/javascript, application/json, or any image/*, video/*,
        audio/*, or font/* type.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          required: true
          description: Relative path of the file inside the bundle, e.g. `index.html` or `assets/vo.ogg`.
          schema:
            type: string
            minLength: 1
            maxLength: 200
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCompositionFileRequest'
      responses:
        '200':
          description: File stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositionFile'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '413':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Compositions]
      operationId: deleteCompositionFile
      summary: Delete one file from a composition.
      description: The GCS object is deleted best-effort. The `path` query parameter names the file (see putCompositionFile for why it is not a path parameter).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          required: true
          description: Relative path of the file inside the bundle.
          schema:
            type: string
            minLength: 1
            maxLength: 200
      responses:
        '204':
          description: File deleted.
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /compositions/{id}/files:signed-urls:
    post:
      tags: [Compositions]
      operationId: signCompositionFiles
      summary: Mint fresh signed GET URLs for composition files and referenced platform assets.
      description: |
        Returns a short-lived (15-minute) signed URL for each requested entry
        so the web UI can build the preview iframe. Every requested entry
        must resolve, otherwise 404 naming the entry.

        Each `paths` entry is either a relative bundle path naming an
        existing composition file, or a platform-asset reference of the form
        `asset:<uuid>` — the same scheme composition HTML may use in media
        `src` attributes (e.g. `<video src="asset:550e8400-...">`). Asset
        references resolve to the caller's own assets in status `ready` and
        return a signed GET URL for the asset's stored object; an unknown,
        foreign, or not-yet-ready asset returns 404 naming the entry. The
        `asset:` prefix is reserved: bundle file paths must not use it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompositionSignedUrlsRequest'
      responses:
        '200':
          description: One signed URL per requested path, in request order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositionSignedUrlsResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /compositions/{id}/clone:
    post:
      tags: [Compositions]
      operationId: cloneComposition
      summary: Clone a composition, copying its full file bundle.
      description: |
        Creates a new composition owned by the caller from an existing one:
        the description, project link, and meta are copied, and every stored
        file is duplicated (rows and underlying GCS objects, via server-side
        copy) into the new composition — except `nolgia-edits.json`, which is
        intentionally skipped so a new version starts with a clean edit
        overlay.

        This is the version-series primitive: give the source composition a
        `meta.series` and `meta.version`, then clone with a `meta_patch`
        bumping `meta.version` to mint the next version. `meta_patch` is
        shallow-merged over the source meta (`source.meta || meta_patch`):
        top-level keys in the patch replace the source's keys wholesale.

        The clone's name defaults to the source name plus " copy" (truncated
        to fit 80 characters) unless `name` is provided; either way a name
        already used by another of the caller's compositions returns 409.
        An unknown or foreign composition returns 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneCompositionRequest'
      responses:
        '201':
          description: Clone created; `files` lists the copied file inventory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Composition'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /compositions/{id}/render:
    post:
      tags: [Compositions]
      operationId: createCompositionRender
      summary: Queue a server-side MP4 export of the composition's effective timeline.
      description: |
        Enqueues a render of the composition's *effective* timeline — the
        authored HTML timing plus the `nolgia-edits.json` overlay (v1/v2) — to
        an MP4 that is written back as a platform asset (tags `render` and
        `composition:<slug>`). Returns 202 immediately; poll
        `GET /renders/{id}` for completion. A Cloud Run job is triggered
        best-effort; if triggering fails the render stays `queued` and is
        picked up by the next scheduled job tick.

        **Supported timeline subset.** The renderer interprets *placement and
        visibility timing only* — it does not execute scripts or interpret
        GSAP tweens. From `index.html` and any `data-composition-src`
        sub-compositions it renders elements carrying
        `data-start`/`data-duration` (`data-track-index` = z-order,
        default 0):

        - `<video>`, `<audio>`, `<img>` whose `src` resolves to a composition
          file or is an `asset:<uuid>` reference to one of the owner's ready
          platform assets — video/img as visual clips (img = still with
          duration; the `muted` attribute is respected), audio mixed into the
          master track. Asset references are placed by the asset's actual
          modality; unresolvable references are skipped with a warning.
        - Edits overlay v2: element overrides (`start`/`duration`/`track`/
          `hidden`/`srcOffset`) and additions (kind `media` with `assetId` or
          `path`; kind `text`).
        - Pure text elements (an element whose content is plain text with no
          child elements) and text additions — rendered as animated titles
          with basic styling (white text on a dark pill, safe-zone margin).
          Text fidelity is approximate: authored CSS is NOT applied.

        The canvas size comes from `data-width`/`data-height` on the root
        container (default 1080x1920). Everything else — styled `<div>`s,
        GSAP-only animation, unknown tags, unresolvable media — is skipped
        and recorded in the render's `warnings` array.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRenderRequest'
      responses:
        '202':
          description: Render queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Render'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /compositions/{id}/renders:
    get:
      tags: [Compositions]
      operationId: listCompositionRenders
      summary: List the composition's renders, newest first (at most 20).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Renders for the composition, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderList'
