          description: Agent deprovisioned.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/usage:
    get:
      tags: [Agent]
      operationId: getAgentUsage
      summary: Credits spent and jobs created by the current user's agent.
      responses:
        '200':
          description: Aggregated agent usage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentUsage'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/chat:
    post:
      tags: [Agent]
      operationId: sendAgentChatMessage
      summary: Relay a chat message to the user's deployed Hermes agent and return its reply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Agent reply.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        '502':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/messages:
    post:
      tags: [Agent]
      operationId: submitAgentMessage
      summary: Submit a chat message to the user's Hermes agent asynchronously.
      description: |
        The async counterpart to `POST /agent/chat`: the message is persisted
        to the transcript immediately (role `user`, status `complete`)
        together with a pending agent reply row, and `202` returns both ids.
        A background worker relays the message to the agent pod with a
        generous timeout (long agent turns no longer time out at the HTTP
        boundary) and completes or fails the pending row; poll
        `GET /agent/messages` to observe it.

        One turn is in flight per user at a time — the agent pod holds a
        single conversation. Submitting while a reply is still pending
        returns `409` carrying the pending agent message id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAgentMessageRequest'
      responses:
        '202':
          description: Message accepted; the agent reply is being produced asynchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAgentMessageAccepted'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          description: A previous turn is still pending; wait for it to complete or fail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMessageConflict'
        default:
          $ref: '#/components/responses/ProblemResponse'
    get:
      tags: [Agent]
      operationId: listAgentMessages
      summary: Chronological agent chat transcript for the current user.
      description: |
        Returns transcript rows (both roles) in chronological order, oldest
        first. A pending agent row means the reply is still being produced —
        render it as "thinking…" and poll with `since` set to the newest
        `created_at` already seen, re-fetching pending rows until their
        status turns `complete` or `failed`.
      parameters:
        - name: since
          in: query
          required: false
          description: Return only messages created strictly after this timestamp.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Maximum messages to return.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Transcript messages, oldest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMessageList'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/steps:
    get:
      tags: [Agent]
      operationId: listAgentSteps
      summary: Live terminal/tool/message steps of the agent's current session.
      description: |
        Streams the fine-grained steps of the agent's current Hermes session —
        terminal commands (with their input command and captured output), other
        tool calls, file operations, and message events — as a sanitized,
        chronologically-ordered feed for the chat's expandable step chips.

        The API proxies to the agent pod's dashboard server (cookie-authed,
        server-side) and maps its raw session events to a stable schema. Input
        and output payloads are truncated to 4KB each and secret-looking values
        (tokens, keys, passwords, bearer credentials) are masked.

        Poll with `since` set to the newest `at` already seen while a turn is
        pending, then stop shortly after it settles. When the agent has no
        dashboard (older deployments or not yet provisioned) the endpoint
        returns `404` — clients should treat this as "no steps" and render
        nothing rather than an error.
      parameters:
        - name: since
          in: query
          required: false
          description: Return only steps whose `at` timestamp is strictly after this value.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Maximum steps to return (newest session's steps, oldest first).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Sanitized steps, oldest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStepList'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/config:
    get:
      tags: [Agent]
      operationId: getAgentConfig
      summary: List the agent's custom configuration entries. Secret values are redacted (empty string) in the response.
      responses:
        '200':
          description: The agent's configuration entries, sorted by key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfig'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Agent]
      operationId: updateAgentConfig
      summary: Upsert custom configuration entries (e.g. TELEGRAM_BOT_TOKEN) injected into the agent pod's environment. A running agent is flipped back to `pending_deploy` so the deploy pipeline applies the change (typically within ~5 minutes).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentConfigRequest'
      responses:
        '200':
          description: The agent's configuration after the update (secret values redacted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfig'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/config/{key}:
    delete:
      tags: [Agent]
      operationId: deleteAgentConfigEntry
      summary: Remove a custom configuration entry. A running agent is flipped back to `pending_deploy` so the deploy pipeline applies the change.
      parameters:
        - $ref: '#/components/parameters/AgentConfigKey'
      responses:
        '204':
          description: Entry removed.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/dashboard/ticket:
    post:
      tags: [Agent]
      operationId: createAgentDashboardTicket
      summary: Mint a short-lived ticket URL for embedding the agent's live dashboard.
      description: >
        Returns a URL on the public dashboard host (e.g. `dash.nolgia.ai`) that
        the web app loads in an iframe. The embedded ticket expires after 120
        seconds and is exchanged by the dashboard relay for a 12h cookie
        session bound to the requesting user and their agent. Browser (JWT)
        sessions only — PATs are rejected.
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Dashboard ticket minted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDashboardTicket'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/abilities:
    get:
      tags: [Abilities]
      operationId: listAgentAbilities
      summary: List the abilities installed for the current user's agent.
      responses:
        '200':
          description: Installed abilities, newest install first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentInstalledAbility'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /agent/abilities/{slug}:
    post:
      tags: [Abilities]
      operationId: installAgentAbility
      summary: Install a published ability for the current user's agent (applied on the next ability sync). Requires the ability's entitlement (`min_tier`).
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      responses:
        '201':
          description: Ability installed for the agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstalledAbility'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '402':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Abilities]
      operationId: uninstallAgentAbility
      summary: Uninstall an ability from the current user's agent.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      responses:
        '204':
          description: Ability uninstalled.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities:
    get:
      tags: [Abilities]
      operationId: listAbilities
      summary: List published marketplace abilities (metadata only — content is never included in listings). Customers see the public catalog; admin accounts also see private abilities.
      responses:
        '200':
          description: Published abilities.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ability'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Abilities]
      operationId: publishAbility
      summary: Publish a new ability version (admin only; upserts the ability by slug, versions are immutable).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishAbilityRequest'
      responses:
        '201':
          description: Ability version published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ability'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities/{slug}:
    get:
      tags: [Abilities]
      operationId: getAbility
      summary: Get a published ability's detail.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      responses:
        '200':
          description: The ability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ability'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags: [Abilities]
      operationId: updateAbility
      summary: Update an ability's marketplace lifecycle (admin only). Currently the only mutable field is `visibility` — flipping it to `private` "holds" the ability (removed from the public catalog and no longer newly installable), flipping back to `public` unholds it. Existing installs keep working regardless. Ability content is immutable; editing publishes a new version via `POST /abilities/{slug}/versions`.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAbilityRequest'
      responses:
        '200':
          description: The updated ability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ability'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Abilities]
      operationId: deleteAbility
      summary: Yank an entire ability and all its versions (admin only). Refused with 409 when any agent has it installed, unless `force=true` is passed (which cascade-uninstalls it from every agent). Prefer holding (PATCH visibility=private) over deleting when agents depend on it.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
        - name: force
          in: query
          required: false
          description: When true, delete even if agents have the ability installed, cascade-removing it from every agent. Without it, a delete of an installed ability is refused with 409.
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Ability deleted.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities/{slug}/content:
    get:
      tags: [Abilities]
      operationId: getAbilityContent
      summary: Download the latest published version's package content (base64 tar.gz). Entitlement-gated — the caller's subscription must satisfy the ability's `min_tier`.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      responses:
        '200':
          description: Latest version content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbilityContent'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '402':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities/{slug}/files:
    get:
      tags: [Abilities]
      operationId: getAbilityFiles
      summary: Inspect the unpacked contents of the latest published version (admin only). Server-side unpacks the package tar.gz and returns each file's path, size, and (for text files) its decoded body. Not a customer feature — this is the admin abilities inspector.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      responses:
        '200':
          description: Unpacked ability files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbilityFiles'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities/{slug}/versions:
    post:
      tags: [Abilities]
      operationId: publishAbilityVersionFromFiles
      summary: Publish a new immutable version from an edited file set (admin only). Repacks the given files into a tar.gz, recomputes `has_code`, inserts a new immutable version and moves `latest`. This is the save path for the admin code editor — versions are immutable, so an edit is a new version. Ability metadata (name, visibility, access, min_tier) is preserved from the current ability; only the package payload and version change.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishAbilityVersionRequest'
      responses:
        '201':
          description: New version published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ability'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /abilities/{slug}/versions/{version}:
    delete:
      tags: [Abilities]
      operationId: deleteAbilityVersion
      summary: Delete a single non-latest version of an ability (admin only). Deleting the latest version is refused with 409 — it would silently change what installed agents receive; publish a new version or delete the whole ability instead. Deleting the only version is likewise refused.
      parameters:
        - $ref: '#/components/parameters/AbilitySlug'
        - name: version
          in: path
          required: true
          description: Semver version to delete.
          schema:
            type: string
            pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
            examples: ['1.0.0']
      responses:
        '204':
          description: Version deleted.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /internal/agents:
    get:
      tags: [Agent]
      operationId: listAgentsInternal
      summary: List agents, optionally filtered by status. Deploy-pipeline only.
      security:
        - provisionerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AgentStatus'
      responses:
        '200':
          description: Agents matching the filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /internal/agents/{id}/credentials:
    post:
      tags: [Agent]
      operationId: issueAgentCredentials
      summary: Mint (or rotate) an agent's NOLGIA_TOKEN. Deploy-pipeline only; plaintext is returned ONCE.
      security:
        - provisionerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '201':
          description: Agent token minted. Any previous agent token is revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCredentials'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /internal/agents/{id}/deployment:
    put:
      tags: [Agent]
      operationId: updateAgentDeployment
      summary: Report deployment state (status, chat endpoint) for an agent. Deploy-pipeline only.
      security:
        - provisionerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentDeploymentRequest'
      responses:
        '200':
          description: Updated agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /internal/agents/{id}/config:
    get:
      tags: [Agent]
      operationId: getAgentConfigInternal
      summary: Full (plaintext) custom configuration for an agent, for injection into the pod's Secret. Deploy-pipeline only.
      security:
        - provisionerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: The agent's configuration entries with plaintext values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfig'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Auth.js v5 JWT issued by nolgia.ai for browser sessions.
    patAuth:
      type: http
      scheme: bearer
      bearerFormat: PAT
      description: Personal Access Token (prefix `nol_`) for CLI and MCP clients.
    provisionerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Static shared secret (`AGENT_PROVISIONER_TOKEN`) for the internal agent deploy pipeline.

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor returned by a prior response.
      schema:
        type: string
        minLength: 1
        maxLength: 256
    JobId:
      name: id
      in: path
      required: true
      description: Job UUID.
      schema:
        type: string
        format: uuid
    PatId:
      name: id
      in: path
      required: true
      description: PAT UUID.
      schema:
        type: string
        format: uuid
    AgentId:
      name: id
      in: path
      required: true
      description: Agent UUID.
      schema:
        type: string
        format: uuid
    AgentConfigKey:
      name: key
      in: path
      required: true
      description: Configuration entry key (environment-variable style).
      schema:
        type: string
        pattern: '^[A-Z][A-Z0-9_]{0,63}$'
        examples: ['TELEGRAM_BOT_TOKEN']

    AbilitySlug:
      name: slug
      in: path
      required: true
      description: Ability slug (lowercase letters, digits, hyphens).
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{0,63}$'
        examples: ['short-film']

  responses:
    ProblemResponse:
      description: Error formatted per RFC 7807.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          examples: [ok]
        version:
          type: string
          description: Build version (semver or git sha).
          examples: ['0.1.0']
        uptime_seconds:
          type: integer
          minimum: 0
          examples: [1234]

    SSETicket:
      type: object
      additionalProperties: false
      required: [ticket, expires_at]
      description: Single-use credential authorizing one job status stream connection.
      properties:
        ticket:
          type: string
          description: Opaque single-use secret to pass as the `ticket` query parameter.
          examples: ['9f8c2a1e6b4d7f0a3c5e8b1d4f7a0c3e6b9d2f5a8c1e4b7d0f3a6c9e2b5d8f1a']
        expires_at:
          type: string
          format: date-time
          description: Instant after which the ticket can no longer be redeemed.

    Error:
      type: object
      additionalProperties: false
      required: [type, title, status]
      description: RFC 7807 problem object.
      properties:
        type:
          type: string
          format: uri
          description: A URI reference identifying the problem type.
          examples: ['https://nolgia.ai/errors/invalid-request']
        title:
          type: string
          examples: ['Invalid request']
        status:
          type: integer
          minimum: 400
          maximum: 599
          examples: [422]
        detail:
          type: string
          examples: ['`prompt` must be at least 1 character.']
        instance:
          type: string
          format: uri
          examples: ['https://api.nolgia.ai/v1/generate/image']
        request_id:
          type: string
          examples: ['req_01J5R2M9YBX2K4Z3WQH6P8VNA1']

    User:
      type: object
      additionalProperties: false
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          examples: ['ada@nolgia.ai']
        name:
          type: string
          nullable: true
          examples: ['Ada Lovelace']
        image_url:
          type: string
          nullable: true
          format: uri
        created_at:
          type: string
          format: date-time

    Modality:
      type: string
      enum: [image, audio, video]

    ModelList:
      type: object
      additionalProperties: false
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/Model'

    Model:
      type: object
      additionalProperties: false
      required: [id, modality, recommended]
      properties:
        id:
          type: string
          examples: ['veo-3.1']
        modality:
          $ref: '#/components/schemas/Modality'
        recommended:
          type: boolean
          description: Whether this model is surfaced as a priority/recommended option.
        cost:
          $ref: '#/components/schemas/ModelCost'
        video:
          $ref: '#/components/schemas/VideoCapabilities'
        audio:
          $ref: '#/components/schemas/AudioCapabilities'

    ModelCost:
      type: object
      additionalProperties: false
      description: |
        Credit pricing for a model. Absent when pricing has not been published
        for the model; clients must render an unknown/pending state instead of
        inventing a rate.
      required: [credits, unit]
      properties:
        credits:
          type: integer
          minimum: 1
          description: Credits charged per unit.
          examples: [42]
        unit:
          $ref: '#/components/schemas/ModelCostUnit'
        baseline_seconds:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Present only when unit is per_clip. The clip duration in seconds that
            `credits` assumes. The actual charge scales with the requested duration
            as ceil(credits * duration_seconds / baseline_seconds).
          examples: [5]

    ModelCostUnit:
      type: string
      description: |
        Billing dimension for a model's credit cost. per_image multiplies by the
        requested image count, per_clip scales with video duration against
        baseline_seconds, per_generation is a flat charge per request.
      enum: [per_image, per_clip, per_generation]

    VideoCapabilities:
      type: object
      additionalProperties: false
      description: Per-model duration and aspect-ratio support for video models.
      properties:
        durations:
          type: array
          description: Discrete set of supported durations in seconds, when the model only allows specific values.
          items:
            type: integer
          examples: [[4, 6, 8]]
        min_duration:
          type: integer
          nullable: true
          description: Minimum supported duration in seconds, when durations form a continuous range.
        max_duration:
          type: integer
          nullable: true
          description: Maximum supported duration in seconds, when durations form a continuous range.
        aspect_ratios:
          type: array
          items:
            $ref: '#/components/schemas/AspectRatio'
        image_input:
          type: boolean
          description: |
            Whether the model accepts an `image_url`. Dedicated image-to-video
            variants require one; models like Veo and Omni Flash take one
            optionally alongside the text prompt.

    AudioCapabilities:
      type: object
      additionalProperties: false
      description: Per-model voice catalog for audio (text-to-speech) models.
      properties:
        voices:
          type: array
          description: Selectable voice identifiers for this model. Absent when the model has no enumerable voice catalog.
          items:
            $ref: '#/components/schemas/Voice'

    Voice:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          examples: ['af_bella']
        label:
          type: string
          nullable: true
          description: Human-friendly display name for the voice.
          examples: ['Bella (American female)']

    UploadAssetRequest:
      type: object
      additionalProperties: false
      required: [content_type, data]
      properties:
        content_type:
          type: string
          enum: [image/png, image/jpeg, image/webp]
          description: MIME type of the uploaded bytes.
        data:
          type: string
          format: byte
          minLength: 1
          maxLength: 14000000
          description: Base64-encoded file contents (max ~10MB decoded).
        filename:
          type: string
          nullable: true
          maxLength: 255

    CreateAssetUploadRequest:
      type: object
      additionalProperties: false
      required: [filename, content_type, size_bytes]
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
          description: Original filename, kept as asset metadata.
          examples: ['final-cut.mp4']
        content_type:
          type: string
          enum:
            - video/mp4
            - video/quicktime
            - video/webm
            - audio/mpeg
            - audio/wav
            - audio/ogg
            - image/png
            - image/jpeg
            - image/webp
          description: >
            MIME type of the file. The signed PUT URL is bound to it, so the
            upload request must send exactly this Content-Type header.
        size_bytes:
          type: integer
          format: int64
          minimum: 1
          description: >
            Exact size of the file in bytes. Verified against the uploaded
            object on completion. Limits: 50 GiB for video, 5 GiB for
            audio, 100 MiB for images.
        tags:
          type: array
          maxItems: 10
          description: Tags to apply to the asset; trimmed, lowercased, and de-duplicated.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['final-cut', 'campaign-x']]
        display_name:
          type: string
          nullable: true
          maxLength: 200
          description: >
            Optional human-readable display name stored on the pre-created
            asset (trimmed). Defaults to empty.
          examples: ['Hero shot v2']

    AssetUpload:
      type: object
      additionalProperties: false
      required: [upload_id, asset_id, upload_url, expires_at]
      properties:
        upload_id:
          type: string
          format: uuid
          description: Identifier for `POST /assets/uploads/{id}/complete`.
        asset_id:
          type: string
          format: uuid
          description: The pre-created asset (status `uploading`) the bytes will belong to.
        upload_url:
          type: string
          format: uri
          description: >
            Signed PUT URL. Upload with `PUT <upload_url>` and a
            `Content-Type` header exactly matching the declared
            `content_type`; no Authorization header is needed.
        expires_at:
          type: string
          format: date-time
          description: Expiry of `upload_url` (30 minutes after creation).

    AssetStatus:
      type: string
      enum: [uploading, ready]
      description: >
        Lifecycle status of an asset. `uploading` marks a signed-upload
        asset whose bytes have not been verified yet; `ready` assets are
        fully stored and downloadable.

    ImageModel:
      type: string
      description: Image model identifier exposed by the public API.
      enum:
        - gpt-image-2
        - gpt-image-1
        - imagen-4
        - flux/schnell
        - flux-ultra
        - flux-pro
        - recraft-v3
        - ideogram-v3
        - stable-diffusion-3.5

    AudioModel:
      type: string
      description: Audio model identifier (TTS, music, or SFX).
      enum:
        - fal-ai/kokoro/american-english
        - fal-ai/dia-tts
        - fal-ai/inworld-tts
        - fal-ai/orpheus-tts
        - fal-ai/minimax/speech-2.8-hd
        - fal-ai/minimax/speech-2.8-turbo
        - fal-ai/elevenlabs/tts/eleven-v3
        - fal-ai/elevenlabs/tts/multilingual-v2
        - fal-ai/elevenlabs/tts/turbo-v2.5
        - fal-ai/elevenlabs/music
        - fal-ai/elevenlabs/sound-effects/v2
        - fal-ai/minimax-music/v2.6
        - fal-ai/lyria3/pro
        - fal-ai/stable-audio-25/text-to-audio
        - fal-ai/stable-audio-3/medium/text-to-audio
        - fal-ai/mmaudio-v2/text-to-audio

    VideoModel:
      type: string
      description: |
        Video model identifier. Priority models for v1 are Kling v3.0 and Seedance 2.0 Pro.
        Default is `fal-ai/kling-video/v3/text-to-video`.
      enum:
        - fal-ai/kling-video/v3/text-to-video
        - fal-ai/kling-video/v3/master/text-to-video
        - fal-ai/kling-video/v3/pro/text-to-video
        - fal-ai/kling-video/v3/image-to-video
        - fal-ai/kling-video/v3/master/image-to-video
        - fal-ai/kling-video/v3/pro/image-to-video
        - fal-ai/bytedance/seedance/v2/pro/text-to-video
        - fal-ai/bytedance/seedance/v2/pro/image-to-video
        - veo-3.1
        - veo-3.1-fast
        - omni-flash

    ImageSize:
      type: string
      enum: [square, square_hd, portrait_4_3, portrait_16_9, landscape_4_3, landscape_16_9]

    AspectRatio:
      type: string
      enum: ['16:9', '9:16', '1:1', '4:3', '3:4']

    GenerateImageRequest:
      type: object
      additionalProperties: false
      required: [model, prompt]
      properties:
        model:
          $ref: '#/components/schemas/ImageModel'
        prompt:
          type: string
          minLength: 1
          maxLength: 4000
          examples: ['A neon cyberpunk cat DJing on a rooftop, cinematic']
        negative_prompt:
          type: string
          nullable: true
          maxLength: 4000
        image_size:
          $ref: '#/components/schemas/ImageSize'
        num_images:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
        seed:
          type: integer
          nullable: true
          minimum: 0
        guidance_scale:
          type: number
          nullable: true
          minimum: 0
          maximum: 20
        image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 2048
          description: Source image (https URL) for image-to-image restyle. When set, the model transforms this image instead of generating from scratch.
        tags:
          type: array
          maxItems: 10
          description: Applied to the resulting asset(s); normalized to lowercase.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]

    GenerateImageResponse:
      type: object
      additionalProperties: false
      required: [request_id, asset, assets]
      properties:
        request_id:
          type: string
          examples: ['req_01J5R2M9YBX2K4Z3WQH6P8VNA1']
        asset:
          $ref: '#/components/schemas/Asset'
        assets:
          type: array
          description: All generated images. Length matches num_images. The first entry equals asset.
          items:
            $ref: '#/components/schemas/Asset'
        seed:
          type: integer
          nullable: true
    AudioFormat:
      type: string
      enum: [mp3, wav, ogg, flac]

    GenerateAudioRequest:
      type: object
      additionalProperties: false
      required: [model, prompt]
      properties:
        model:
          $ref: '#/components/schemas/AudioModel'
        prompt:
          type: string
          minLength: 1
          maxLength: 4000
          description: For TTS this is the text to speak; for music/SFX it is the description.
        voice:
          type: string
          nullable: true
          maxLength: 128
          description: TTS voice id (model-specific).
          examples: ['af_bella']
        duration_seconds:
          type: integer
          nullable: true
          minimum: 1
          maximum: 600
        format:
          $ref: '#/components/schemas/AudioFormat'
        tags:
          type: array
          maxItems: 10
          description: Applied to the resulting asset(s); normalized to lowercase.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]

    GenerateAudioResponse:
      type: object
      additionalProperties: false
      required: [request_id, asset]
      properties:
        request_id:
          type: string
        asset:
          $ref: '#/components/schemas/Asset'
        duration_seconds:
          type: number
          nullable: true
          minimum: 0

    GenerateVideoRequest:
      type: object
      additionalProperties: false
      required: [model, prompt]
      properties:
        model:
          $ref: '#/components/schemas/VideoModel'
        prompt:
          type: string
          minLength: 1
          maxLength: 4000
        negative_prompt:
          type: string
          nullable: true
          maxLength: 4000
        image_url:
          type: string
          nullable: true
          format: uri
          description: Required for image-to-video models; ignored for text-to-video.
        aspect_ratio:
          $ref: '#/components/schemas/AspectRatio'
        duration_seconds:
          type: integer
          minimum: 1
          maximum: 60
          default: 5
        seed:
          type: integer
          nullable: true
          minimum: 0
        generate_audio:
          type: boolean
          nullable: true
          description: >-
            Ask the model to generate a synchronized audio track
            (dialogue/ambient/SFX). Model-dependent — supported by Seedance
            and Veo; ignored by models without native audio.
        shots:
          type: array
          nullable: true
          minItems: 1
          maxItems: 8
          description: >-
            Multi-shot sequence: divide the clip into sequential shots, each
            with its own prompt, duration, and optional sound direction. The
            server composes a structured multi-shot prompt (the top-level
            prompt becomes overall style/context direction) and derives the
            clip duration from the shot durations; if duration_seconds is
            also set it must equal their sum. Best on Seedance, which cuts
            between shots natively.
          items:
            $ref: '#/components/schemas/VideoShot'
        tags:
          type: array
          maxItems: 10
          description: Applied to the resulting asset(s); normalized to lowercase.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]

    VideoShot:
      type: object
      additionalProperties: false
      required: [prompt, duration_seconds]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 2000
        duration_seconds:
          type: integer
          minimum: 1
          maximum: 15
        audio:
          type: string
          nullable: true
          maxLength: 500
          description: Sound-design direction for this shot (written into the composed prompt).

    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed, canceled]
      # Pin generated Go constant names (see SubscriptionStatus note).
      x-enum-varnames: [JobStatusQueued, JobStatusRunning, JobStatusSucceeded, JobStatusFailed, JobStatusCanceled]

    Job:
      type: object
      additionalProperties: false
      required: [id, user_id, modality, model, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        modality:
          $ref: '#/components/schemas/Modality'
        model:
          type: string
          examples: ['fal-ai/kling-video/v3/text-to-video']
        status:
          $ref: '#/components/schemas/JobStatus'
        fal_request_id:
          type: string
          nullable: true
        asset:
          oneOf:
            - $ref: '#/components/schemas/Asset'
        error:
          oneOf:
            - $ref: '#/components/schemas/Error'
        progress:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          nullable: true
          format: date-time

    JobPage:
      type: object
      additionalProperties: false
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        next_cursor:
          type: string
          nullable: true
        total:
          type: integer
          description: Total number of jobs matching the status/modality filter, ignoring pagination.
    Asset:
      type: object
      additionalProperties: false
      required: [id, user_id, modality, model, signed_url, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        modality:
          $ref: '#/components/schemas/Modality'
        model:
          type: string
        display_name:
          type: string
          maxLength: 200
          description: >
            Human-readable display name. Always present in responses; empty
            string when unset. Set it at upload time (`POST /assets/uploads`)
            or later via `PATCH /assets/{id}`.
          examples: ['Hero shot v2']
        prompt:
          type: string
          nullable: true
        signed_url:
          type: string
          format: uri
          description: Time-limited GCS signed URL for download.
          examples: ['https://storage.googleapis.com/nolgia-generations-prod/u/abc/img/xyz.png?X-Goog-Signature=...']
        expires_at:
          type: string
          format: date-time
          description: Expiry of `signed_url`.
        mime_type:
          type: string
          examples: ['image/png']
        size_bytes:
          type: integer
          nullable: true
          minimum: 0
        width:
          type: integer
          nullable: true
          minimum: 1
        height:
          type: integer
          nullable: true
          minimum: 1
        duration_seconds:
          type: number
          nullable: true
          minimum: 0
          description: >
            Media duration in seconds for video/audio assets. Recorded at
            creation time for generated videos and backfilled asynchronously
            (ffprobe) for uploaded/legacy assets; null until known.
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          description: Time-limited signed URL for a server-generated thumbnail (image downscale or video poster frame). Null when the asset has no thumbnail.
        tags:
          type: array
          maxItems: 10
          description: Free-form lowercase tags attached to the asset.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]
        status:
          $ref: '#/components/schemas/AssetStatus'
        projects:
          type: array
          description: >
            The asset's project memberships, newest membership first. Only
            returned by `GET /assets/{id}` (always present there, `[]` when
            the asset belongs to no project); omitted from list responses.
          items:
            $ref: '#/components/schemas/AssetProjectRef'
        created_at:
          type: string
          format: date-time

    AssetProjectRef:
      type: object
      additionalProperties: false
      required: [id, name, is_default]
      description: A project an asset belongs to.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          examples: ['Launch teaser']
        is_default:
          type: boolean
          description: True when this is the user's default "Library" project.

    AssetPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        next_cursor:
          type: string
          nullable: true
        total:
          type: integer
          format: int64
          description: Total number of assets matching the request's filters across all pages.

    UpdateAssetRequest:
      type: object
      additionalProperties: false
      description: >
        Partial asset update. All fields are optional but at least one must
        be provided; omitted fields are left unchanged.
      properties:
        tags:
          type: array
          maxItems: 10
          description: Replaces the asset's full tag set. Tags are trimmed, lowercased, and de-duplicated.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]
        display_name:
          type: string
          maxLength: 200
          description: >
            Replaces the asset's display name (trimmed). An empty string
            clears it.
          examples: ['Hero shot v2']
        prompt:
          type: string
          maxLength: 4000
          description: >
            Overwrites the asset's prompt. Intended for backfilling
            provenance on uploaded assets (e.g. recording the prompt a file
            was generated from elsewhere).
        metadata:
          type: object
          description: >
            Merged into the asset's existing metadata object (existing keys
            not present in the patch are kept; patch keys overwrite). At most
            16 KiB serialized.
    Character:
      type: object
      additionalProperties: false
      required: [id, user_id, name, description, reference_assets, created_at, updated_at]
      description: User-owned reusable subject for image/video generation.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
          examples: ['Captain Nova']
        description:
          type: string
          maxLength: 2000
          examples: ['A silver-haired astronaut with a scarred left cheek and a teal flight suit.']
        reference_assets:
          type: array
          maxItems: 4
          description: Reference images (image assets) in display order, each with a fresh signed URL.
          items:
            $ref: '#/components/schemas/Asset'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CharacterList:
      type: object
      additionalProperties: false
      required: [characters]
      properties:
        characters:
          type: array
          items:
            $ref: '#/components/schemas/Character'

    CreateCharacterRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          examples: ['Captain Nova']
        description:
          type: string
          nullable: true
          maxLength: 2000
        reference_asset_ids:
          type: array
          minItems: 0
          maxItems: 4
          description: IDs of existing image assets owned by the caller, in display order.
          items:
            type: string
            format: uuid

    UpdateCharacterRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 2000
        reference_asset_ids:
          type: array
          nullable: true
          minItems: 0
          maxItems: 4
          description: Replaces the full set of reference images when provided.
          items:
            type: string
            format: uuid

    Project:
      type: object
      additionalProperties: false
      required: [id, user_id, name, description, asset_count, created_at, updated_at]
      description: User-owned grouping of assets; an asset can belong to multiple projects.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
          examples: ['Launch teaser']
        description:
          type: string
          maxLength: 2000
          examples: ['Assets for the spring launch teaser campaign.']
        asset_count:
          type: integer
          minimum: 0
          description: Number of assets currently in the project.
        composition_count:
          type: integer
          minimum: 0
          description: Number of compositions currently linked to the project. Always present in responses.
        is_default:
          type: boolean
          description: >
            True for the user's default "Library" project: created on demand,
            it receives every new asset that does not match another project's
            auto-tags. Always present in responses. Read-only: it cannot be
            set via create or update requests (unknown request fields are
            rejected with 400).
        auto_tags:
          type: array
          maxItems: 10
          description: New assets created with an overlapping tag are automatically added to this project.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectList:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          examples: ['Launch teaser']
        description:
          type: string
          nullable: true
          maxLength: 2000
        auto_tags:
          type: array
          maxItems: 10
          description: New assets created with an overlapping tag are automatically added to this project.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]

    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 2000
        auto_tags:
          type: array
          nullable: true
          maxItems: 10
          description: Replaces the project's full auto-tag set when provided. New assets created with an overlapping tag are automatically added to this project.
          items:
            type: string
            minLength: 1
            maxLength: 40
          examples: [['hero', 'draft']]

    AddProjectAssetsRequest:
      type: object
      additionalProperties: false
      required: [asset_ids]
      properties:
        asset_ids:
          type: array
          minItems: 1
          maxItems: 100
          description: IDs of existing assets owned by the caller.
          items:
            type: string
            format: uuid

    Composition:
      type: object
      additionalProperties: false
      required: [id, user_id, name, description, meta, created_at, updated_at]
      description: |
        HyperFrames-style HTML video composition: a user-owned bundle of files
