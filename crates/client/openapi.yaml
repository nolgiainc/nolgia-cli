openapi: 3.0.3
info:
  title: Nolgia API
  version: 0.1.0
  summary: Generative media platform (image, audio, video) — single contract for web, CLI, and MCP clients.
  description: |
    Nolgia API is the single backend serving the Nolgia website, Rust CLI, and MCP server.
    It orchestrates three generation paths:
      * **image** — synchronous (5–15s typical)
      * **audio** — long-poll synchronous (up to 900s)
      * **video** — asynchronous via job orchestrator
    All non-public endpoints require either an Auth.js bearer JWT (web) or a Personal Access Token (CLI/MCP).
  contact:
    name: Nolgia Engineering
    url: https://nolgia.ai
  license:
    name: Proprietary
    url: https://nolgia.ai/terms

servers:
  - url: https://api.nolgia.ai/v1
    description: Production
  - url: https://api.stg.nolgia.ai/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local development

tags:
  - name: Auth
    description: Sign-in flows for CLI/MCP (device code) and current-user info.
  - name: Generate
    description: Image, audio, and video generation endpoints.
  - name: Models
    description: Model catalog and per-model capabilities.
  - name: Jobs
    description: Async job lifecycle (used primarily for video).
  - name: Assets
    description: Generated media stored in GCS with signed URLs.
  - name: Characters
    description: User-owned reusable subjects (name, description, reference images) for generation.
  - name: Projects
    description: User-owned groupings of assets; an asset can belong to multiple projects.
  - name: Compositions
    description: |
      HyperFrames-style HTML video compositions: a bundle of files
      (index.html + compositions/*.html + assets/* + meta.json) authored by a
      user's Hermes agent and rendered by the web UI as a scrubbable timeline.
      The API stores the files in GCS and serves them back via short-lived
      signed URLs; it never renders or executes composition content.

      Version series convention: compositions that are versions of the same
      work share a `meta.series` string and carry an integer `meta.version`.
      These are ordinary meta keys — the API stores them verbatim and never
      assigns or increments them; clients own the numbering. Create a new
      version with `POST /compositions/{id}/clone` (typically bumping
      `meta.version` via `meta_patch`) and list a series with
      `GET /compositions?series=...`.
  - name: Activity
    description: |
      Read-only chronological feed of platform events (generations, assets,
      compositions, renders), assembled at read time from the underlying
      resources — nothing extra is stored to serve it.
  - name: Billing
    description: Subscription state and Stripe Customer Portal.
  - name: PAT
    description: Personal Access Token issuance and revocation.
  - name: Agent
    description: Per-customer Hermes agent provisioning, usage, and chat relay.
  - name: Abilities
    description: Marketplace of admin-published ability packages that customer Hermes agents install and run.
  - name: Health
    description: Service health probes.

security:
  - bearerAuth: []
  - patAuth: []

paths:

  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '429':
          $ref: '#/components/responses/ProblemResponse'
        '503':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /models:
    get:
      tags: [Models]
      operationId: listModels
      summary: List available models and their capabilities.
      responses:
        '200':
          description: Model catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the currently authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /auth/device:
    post:
      tags: [Auth]
      operationId: startDeviceAuth
      summary: Begin device-code OAuth flow (CLI/MCP).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceAuthRequest'
      responses:
        '200':
          description: Device authorization started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /auth/device/token:
    post:
      tags: [Auth]
      operationId: pollDeviceAuth
      summary: Poll for device-code completion to exchange for an access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTokenRequest'
      responses:
        '200':
          description: Authorization granted; token returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTokenResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /auth/device/approve:
    post:
      tags: [Auth]
      operationId: approveDeviceAuth
      summary: Approve a pending device-code authorization for the signed-in user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceApproveRequest'
      responses:
        '204':
          description: Device authorization approved.
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /generate/image:
    post:
      tags: [Generate]
      operationId: generateImage
      summary: Submit an image generation job (asynchronous).
      description: |
        Returns immediately with a queued job. Use `GET /jobs/{id}` or
        `GET /jobs/{id}/wait` to track completion, then `GET /assets?job_id={id}`
        to retrieve the produced asset(s).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
      responses:
        '202':
          description: Job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '402':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /generate/audio:
    post:
      tags: [Generate]
      operationId: generateAudio
      summary: Submit an audio generation job (asynchronous).
      description: |
        Returns immediately with a queued job. Use `GET /jobs/{id}` or
        `GET /jobs/{id}/wait` to track completion, then `GET /assets?job_id={id}`
        to retrieve the produced asset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateAudioRequest'
      responses:
        '202':
          description: Job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '402':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /generate/video:
    post:
      tags: [Generate]
      operationId: generateVideo
      summary: Submit a video generation job (asynchronous).
      description: |
        Returns immediately with a job. Default model is Kling v3.0 text-to-video.
        Use `GET /jobs/{id}` or `GET /jobs/{id}/wait` to retrieve the final asset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateVideoRequest'
      responses:
        '202':
          description: Job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '402':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /jobs:
    get:
      tags: [Jobs]
      operationId: listJobs
      summary: List jobs for the current user.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/JobStatus'
        - name: modality
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Modality'
      responses:
        '200':
          description: Paginated list of jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPage'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /jobs/{id}:
    get:
      tags: [Jobs]
      operationId: getJob
      summary: Get a single job.
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /jobs/{id}/wait:
    get:
      tags: [Jobs]
      operationId: waitForJob
      summary: Block until the job reaches a terminal state (or timeout).
      description: Long-poll variant; server holds the connection up to `timeout_seconds` (max 900).
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: timeout_seconds
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 900
            default: 300
      responses:
        '200':
          description: Job reached a terminal state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '408':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /jobs/{id}/sse-ticket:
    post:
      tags: [Jobs]
      operationId: createJobSSETicket
      summary: Mint a single-use ticket for the job status stream.
      description: >
        Returns a short-lived, single-use ticket that authorizes one
        `GET /jobs/{id}/sse` connection. Required because `EventSource`
        cannot send an `Authorization` header. The ticket is consumed on
        first use and expires after 60 seconds.
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '201':
          description: Ticket issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSETicket'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '503':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /jobs/{id}/sse:
    get:
      tags: [Jobs]
      operationId: streamJobSSE
      summary: Stream job status updates over Server-Sent Events.
      description: >
        Opens a `text/event-stream` connection that emits the current job
        state immediately, then a `status` event per update and a final
        `complete` event when the job reaches a terminal state. Authorized
        by a single-use `ticket` query parameter from `POST /jobs/{id}/sse-ticket`,
        not by the bearer schemes.
      security: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: ticket
          in: query
          required: true
          description: Single-use ticket from `POST /jobs/{id}/sse-ticket`.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Event stream opened.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '503':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /assets:
    get:
      tags: [Assets]
      operationId: listAssets
      summary: List the current user's assets.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: modality
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Modality'
        - name: job_id
          in: query
          required: false
          description: Return only assets produced by the given job.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Return only assets carrying the given tag.
          schema:
            type: string
            minLength: 1
            maxLength: 40
        - name: project_id
          in: query
          required: false
          description: Return only assets belonging to the given project.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          description: >
            Filter by asset lifecycle status. Defaults to `ready`, hiding
            assets whose signed upload has not been completed yet.
          schema:
            $ref: '#/components/schemas/AssetStatus'
      responses:
        '200':
          description: Paginated list of assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetPage'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Assets]
      operationId: uploadAsset
      summary: Upload a source image for image-to-image or image-to-video.
      description: >
        Stores the supplied bytes and returns an asset whose signed_url can be
        passed as image_url to generation endpoints. Accepts base64 JSON up to
        ~10MB decoded, which only suits small images: for large media files
        (video/audio artifacts, hundreds of MB) use the signed-upload flow
        instead — `POST /assets/uploads` followed by a direct PUT and
        `POST /assets/uploads/{id}/complete`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadAssetRequest'
      responses:
        '201':
          description: Asset stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '413':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /assets/{id}:
    get:
      tags: [Assets]
      operationId: getAsset
      summary: Fetch one of the current user's assets with a fresh signed URL.
      description: >
        Unlike the list endpoint, the response includes `projects`: the
        asset's project memberships (newest membership first, `[]` when the
        asset belongs to no project).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: disposition
          in: query
          required: false
          description: >
            When set to `attachment`, the returned `signed_url` serves the
            asset with a `Content-Disposition: attachment` header (bound into
            the signature) so browsers download the file instead of rendering
            it inline. The download filename is derived from the asset's
            display name (with an extension inferred from its MIME type),
            falling back to the original upload filename, then to
            `<id>.<ext>`. Omit for the default inline-viewing URL.
          schema:
            type: string
            enum: [attachment]
      responses:
        '200':
          description: Asset found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags: [Assets]
      operationId: updateAsset
      summary: Update one of the current user's assets (tags, display name, prompt, metadata).
      description: >
        Partial update: `tags` replaces the asset's full tag set (trimmed,
        lowercased, and de-duplicated server-side), `display_name` renames
        the asset, `prompt` overwrites the stored prompt (intended for
        backfilling provenance on uploaded assets), and `metadata` is merged
        into the existing metadata object (patch keys overwrite, other keys
        are kept). At least one field is required; omitted fields are left
        unchanged.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetRequest'
      responses:
        '200':
          description: Asset updated; returned with a fresh signed URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Assets]
      operationId: deleteAsset
      summary: Delete one of the current user's assets.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Asset deleted.
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /assets/uploads:
    post:
      tags: [Assets]
      operationId: createAssetUpload
      summary: Start a signed upload for a large media asset.
      description: >
        Pre-creates an asset in status `uploading` and returns a short-lived
        signed PUT URL for uploading the bytes directly to storage, bypassing
        the base64 JSON limit of `POST /assets`. PUT the file to `upload_url`
        with a `Content-Type` header exactly matching the declared
        `content_type` (the signature covers it), then call
        `POST /assets/uploads/{upload_id}/complete` to verify the object and
        flip the asset to `ready`. The URL expires after 30 minutes.
        Uploading assets are hidden from `GET /assets` until completed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetUploadRequest'
      responses:
        '201':
          description: Upload slot created; PUT the bytes to `upload_url`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetUpload'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '413':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /assets/uploads/{id}/complete:
    post:
      tags: [Assets]
      operationId: completeAssetUpload
      summary: Finish a signed upload and make the asset available.
      description: >
        Verifies that the object was uploaded to storage and that its size
        matches the declared `size_bytes`, then flips the asset to `ready`
        and applies tag-based project auto-association. Completing an upload
        whose object is missing (or whose size does not match the
        declaration) returns 409 with details. Completing an
        already-completed upload is idempotent and returns the asset with
        200.
      parameters:
        - name: id
          in: path
          required: true
          description: The `upload_id` returned by `POST /assets/uploads`.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset is ready; returned with a fresh signed URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /characters:
    get:
      tags: [Characters]
      operationId: listCharacters
      summary: List the current user's characters, newest first.
      responses:
        '200':
          description: Characters owned by the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterList'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Characters]
      operationId: createCharacter
      summary: Create a reusable character from existing image assets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '201':
          description: Character created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /characters/{id}:
    get:
      tags: [Characters]
      operationId: getCharacter
      summary: Fetch one of the current user's characters with fresh signed reference URLs.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Character found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags: [Characters]
      operationId: updateCharacter
      summary: Update a character's name, description, or reference images.
      description: Partial update; only provided fields change. Providing `reference_asset_ids` replaces the full reference set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterRequest'
      responses:
        '200':
          description: Character updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Characters]
      operationId: deleteCharacter
      summary: Delete one of the current user's characters.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Character deleted.
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List the current user's projects, newest first.
      responses:
        '200':
          description: Projects owned by the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project to group assets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /projects/{id}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Fetch one of the current user's projects.
      parameters:
