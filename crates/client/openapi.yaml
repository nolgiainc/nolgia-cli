          $ref: '#/components/responses/ProblemResponse'

  /projects/{id}/assets:
    post:
      tags: [Projects]
      operationId: addProjectAssets
      summary: Add existing assets to a project (idempotent).
      description: >
        Every asset must exist and belong to the caller. Assets already in
        the project are skipped. Adding an asset to a non-default project
        also removes the asset's membership in the default "Library" project
        (Library is a catch-all, not a permanent home); adding to the
        default project itself leaves memberships untouched.
      parameters:
        - name: id
          in: path
          required: true
