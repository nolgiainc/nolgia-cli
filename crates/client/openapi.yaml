          examples: [['NOLGIA_TOKEN', 'NOLGIA_API_URL']]
        credit_cost_hint:
          type: string
          description: Free-text hint of how the ability spends credits.
        min_tier:
          type: string
          description: Minimum subscription tier required to install or download this ability's content. Empty means free for any account.
          examples: ['studio_min']
        visibility:
          $ref: '#/components/schemas/AbilityVisibility'
        entitled:
          type: boolean
          description: Whether the calling account may download this ability's content (subscription satisfies `min_tier`, or admin). Listings are metadata-only; content download is refused (402) when false.
        access:
          $ref: '#/components/schemas/AbilityAccess'
        price_cents:
          type: integer
          nullable: true
          minimum: 0
          description: For `premium_addon` abilities, the add-on price in cents. `null` for `included` abilities. Metadata only — no purchase flow enforces it yet.
          examples: [1500]
        interval:
          allOf:
            - $ref: '#/components/schemas/AbilityInterval'
          nullable: true
          description: For `premium_addon` abilities, the billing interval of `price_cents`. `null` for `included` abilities.
        has_code:
          type: boolean
          description: |
            True when the package carries a code payload — any file beyond the
            manifest files (`SKILL.md` and `ability.json`). Computed at publish
            time. Drives the marketplace "Package" vs "Ability"
            (instructions-only) kind badge.
        latest_version:
          type: string
          description: Latest published semver version.
          examples: ['1.0.0']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AbilityContent:
      type: object
      additionalProperties: false
      required: [slug, version, manifest, content_base64]
      properties:
        slug:
          type: string
        version:
          type: string
          description: The version this content belongs to (the latest published version).
        manifest:
          type: object
          description: The `ability.json` manifest captured at publish time.
        content_base64:
          type: string
          description: Base64-encoded tar.gz of the ability package directory.

    AbilityFiles:
      type: object
      additionalProperties: false
      required: [version, files]
      description: The unpacked contents of an ability package version, for the admin inspector.
      properties:
        version:
          type: string
          description: The version these files belong to (the latest published version).
        files:
          type: array
          items:
            $ref: '#/components/schemas/AbilityFile'
          description: One entry per file in the package, SKILL.md and the manifest (`ability.json`) first, then the rest alphabetically by path.

    AbilityFile:
      type: object
      additionalProperties: false
      required: [path, size_bytes, is_binary]
      properties:
        path:
          type: string
          description: Slash-separated path of the file within the package.
          examples: ['SKILL.md', 'pipeline/render.py']
        size_bytes:
          type: integer
          description: Uncompressed size of the file in bytes.
        is_binary:
          type: boolean
          description: True when the file is detected as binary (null bytes or invalid UTF-8); `content` is omitted for binary files.
        content:
          type: string
          description: The UTF-8 file body, present only for text files. Truncated to 256 KiB when the file is larger (see `truncated`).
        truncated:
          type: boolean
          description: True when `content` was truncated because the text file exceeded the 256 KiB inline cap.

    AgentInstalledAbility:
      type: object
      additionalProperties: false
      required: [slug, name, description, latest_version, installed_at]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        latest_version:
          type: string
          description: Latest published version; installs always follow latest (no pinning in v1).
        installed_at:
          type: string
          format: date-time

    PublishAbilityRequest:
      type: object
      additionalProperties: false
      required: [slug, name, version, content_base64]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{0,63}$'
          examples: ['short-film']
        name:
          type: string
          minLength: 1
          maxLength: 128
        version:
          type: string
          description: Semver version; must be new for this slug (versions are immutable).
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
          examples: ['1.0.0']
        description:
          type: string
          maxLength: 4000
        required_env:
          type: array
          items:
            type: string
        credit_cost_hint:
          type: string
          maxLength: 500
        min_tier:
          type: string
          enum: ['', starter, pro, studio, studio_min, studio_mid, studio_max]
          x-enum-varnames: [AbilityTierFree, AbilityTierStarter, AbilityTierPro, AbilityTierStudio, AbilityTierStudioMin, AbilityTierStudioMid, AbilityTierStudioMax]
          description: Minimum subscription tier required to install/download the ability. Empty (default) means free.
        access:
          allOf:
            - $ref: '#/components/schemas/AbilityAccess'
          description: Commercial access model. Defaults to `included` when omitted. `premium_addon` requires `price_cents` + `interval`.
        price_cents:
          type: integer
          nullable: true
          minimum: 0
          description: Add-on price in cents, required for `premium_addon` (and rejected for `included`). Metadata only — no purchase flow yet.
        interval:
          allOf:
            - $ref: '#/components/schemas/AbilityInterval'
          nullable: true
          description: Billing interval of `price_cents`, required for `premium_addon` (and rejected for `included`).
        visibility:
          $ref: '#/components/schemas/AbilityVisibility'
        manifest:
          type: object
          description: The full `ability.json` manifest, stored verbatim with the version.
        content_base64:
          type: string
          description: Base64-encoded tar.gz of the ability package directory (max 5 MiB decoded).

    UpdateAbilityRequest:
      type: object
      additionalProperties: false
      description: Lifecycle update for an existing ability. Only `visibility` is mutable today; flipping to `private` holds the ability, `public` unholds it.
      properties:
        visibility:
          $ref: '#/components/schemas/AbilityVisibility'

    AbilityFileInput:
      type: object
      additionalProperties: false
      required: [path, content]
      description: 'A single file in an edited ability package. Binary files are carried base64-encoded (set `base64: true`); text files are sent verbatim.'
      properties:
        path:
          type: string
          description: Slash-separated path within the package (e.g. `SKILL.md`, `pipeline/render.py`). No leading slash, `.`, or `..` segments.
          examples: ['SKILL.md', 'pipeline/render.py']
        content:
          type: string
          description: File body. UTF-8 text by default, or base64-encoded bytes when `base64` is true.
        base64:
          type: boolean
          default: false
          description: When true, `content` is base64-decoded to the file's raw bytes (used for binary files the editor round-trips unchanged).

    PublishAbilityVersionRequest:
      type: object
      additionalProperties: false
      required: [version, files]
      description: An edited file set for a new immutable version of an existing ability. The server repacks the files into a tar.gz, recomputes `has_code`, and moves `latest`. Ability metadata is preserved from the current ability.
      properties:
        version:
          type: string
          description: New semver version; must not already exist for this slug (versions are immutable).
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
          examples: ['1.1.0']
        files:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AbilityFileInput'
          description: The complete file set for the new version (not a diff). Repacked into the package tar.gz in the order given. Max 4096 entries, 5 MiB decoded total.

    UpdateAgentDeploymentRequest:
      type: object
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/AgentStatus'
        chat_endpoint:
          type: string
          nullable: true
          format: uri
          description: In-cluster base URL of the hermes gateway API for this agent.
          examples: ['http://cust-a1b2c3d4-api.cust-a1b2c3d4.svc.cluster.local:8642']
        chat_api_key:
          type: string
          nullable: true
          description: API key (API_SERVER_KEY) the relay uses to call the hermes gateway.
        dashboard_endpoint:
          type: string
          nullable: true
          format: uri
          description: In-VPC base URL of the agent's dashboard web UI, behind the shared internal ALB. Omitted by older provisioners.
          examples: ['http://dash.cust-a1b2c3d4.agents.internal']
        dashboard_password:
          type: string
          nullable: true
          description: Dashboard password (user "nolgia") the relay uses for its server-side hermes login when proxying. Omitted by older provisioners.

    AgentDashboardTicket:
      type: object
      additionalProperties: false
      required: [iframe_url, expires_at]
      properties:
        iframe_url:
          type: string
          format: uri
          description: URL on the public dashboard host to load in an iframe; carries a single short-lived ticket.
          examples: ['https://dash.nolgia.ai/?ticket=eyJhbGciOi...']
        expires_at:
          type: string
          format: date-time
          description: When the embedded ticket stops being redeemable (~120s). The cookie session it mints lasts 12h.

    DeviceAuthRequest:
      type: object
      additionalProperties: false
      required: [client_id]
      properties:
        client_id:
          type: string
          minLength: 1
          maxLength: 64
          examples: ['nolgia-cli']
        scope:
          type: string
          nullable: true
          maxLength: 256
          examples: ['generate:* assets:read']

    DeviceAuthResponse:
      type: object
      additionalProperties: false
      required: [device_code, user_code, verification_uri, expires_in, interval]
      properties:
        device_code:
          type: string
          minLength: 1
        user_code:
          type: string
          minLength: 1
          examples: ['BDWP-HQPK']
        verification_uri:
          type: string
          format: uri
          examples: ['https://nolgia.ai/device']
        verification_uri_complete:
          type: string
          nullable: true
          format: uri
        expires_in:
          type: integer
          minimum: 1
          examples: [900]
        interval:
          type: integer
          minimum: 1
          examples: [5]

    DeviceApproveRequest:
      type: object
      additionalProperties: false
      required: [user_code]
      properties:
        user_code:
          type: string
          minLength: 1
          maxLength: 16
          examples: ['BDWP-HQPK']

    DeviceTokenRequest:
      type: object
      additionalProperties: false
      required: [device_code, client_id]
      properties:
        device_code:
          type: string
          minLength: 1
        client_id:
          type: string
          minLength: 1

    DeviceTokenResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Personal Access Token (prefix `nol_`).
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          minimum: 1
          examples: [2592000]
        scope:
          type: string
          nullable: true
