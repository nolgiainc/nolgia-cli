    delete:
      tags: [Compositions]
      operationId: deleteComposition
      summary: Delete a composition and all of its files.
      description: File rows are removed transactionally; the underlying GCS objects are deleted best-effort.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Composition deleted.
        '401':
