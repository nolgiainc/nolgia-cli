        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /activity:
    get:
      tags: [Activity]
      operationId: getActivity
      summary: Chronological activity feed for the current user, newest first.
      description: |
        A read-time event stream assembled from the user's existing jobs,
        assets, compositions, and renders — the feed stores nothing of its
        own. Events carry a server-built, human-readable summary (at most
        160 characters) plus the ids of the resources they refer to.

        With `project_id`, the feed narrows to events whose asset or
        composition belongs to that project: asset events check project
        membership, composition and render events use the composition's
        project link, and generation job events join through the asset the
        job produced. Jobs that have not produced an asset yet (still
        queued/running, or failed before output) therefore appear only in
        the unfiltered feed.
      parameters:
        - name: project_id
          in: query
          required: false
          description: Restrict the feed to events belonging to this project.
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          required: false
          description: >
            Return only events strictly newer than this timestamp. Pass the
            newest `at` already seen to poll for increments.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Maximum events to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Activity events, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityFeed'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

