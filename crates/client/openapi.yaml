  /compositions:
    get:
      tags: [Compositions]
      operationId: listCompositions
      summary: List the current user's compositions, newest first.
      description: Listing omits per-composition files; fetch a single composition for its file inventory.
      parameters:
        - name: project_id
          in: query
          required: false
          description: Return only compositions linked to the given project.
          schema:
            type: string
            format: uuid
        - name: series
          in: query
          required: false
          description: >
            Return only compositions whose `meta.series` equals this value
            (the version-series convention). Series and version are part of
            each composition's `meta`, which list responses already include.
          schema:
            type: string
            minLength: 1
            maxLength: 200
      responses:
        '200':
          description: Compositions owned by the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositionList'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Compositions]
      operationId: createComposition
      summary: Create an empty composition.
      description: Composition names are unique per user; a duplicate name returns 409. An optional `project_id` links the composition to a caller-owned project; an unknown or foreign project returns 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompositionRequest'
      responses:
        '201':
          description: Composition created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Composition'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /compositions/{id}:
    get:
      tags: [Compositions]
